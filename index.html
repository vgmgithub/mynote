<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0e1726" />
  <meta name="color-scheme" content="light dark" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>MyNote Stocks</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <script>
    // Visit ?reset=1 to wipe the service worker + caches and reload cleanly.
    // Useful when a previous SW is serving stale code despite hard reloads.
    if (location.search.indexOf('reset=1') !== -1 && 'serviceWorker' in navigator) {
      (async () => {
        try {
          for (const r of await navigator.serviceWorker.getRegistrations()) await r.unregister();
          for (const k of await caches.keys()) await caches.delete(k);
        } catch (_) {}
        location.replace(location.pathname);
      })();
    }
  </script>
</head>
<body>
  <header class="app-header">
    <div class="title-row">
      <button id="backBtn" class="icon-btn hidden" aria-label="Back to home">&#8249;</button>
      <h1 id="appTitle">MyNote&nbsp;Stocks</h1>
      <button id="menuBtn" class="icon-btn" aria-label="Menu">&#8942;</button>
    </div>
    <nav class="portfolio-tabs" id="portfolioTabs"></nav>
  </header>

  <main id="main">
    <section id="homeView" class="home-view hidden"></section>
    <section id="mfView" class="mf-view hidden"></section>
    <section id="fdView" class="mf-view hidden"></section>
    <section id="divView" class="mf-view hidden"></section>

    <section class="summary hidden" id="summary"></section>
    <div class="price-status-section hidden" id="price-status"></div>

    <div class="toolbar hidden" id="toolbar">
      <div class="seg" id="filterSeg"></div>
      <div class="sortbar" id="sortBar">
        <button class="sort-btn" type="button" data-field="name">Name</button>
        <button class="sort-btn" type="button" data-field="pct">Return %</button>
        <button class="sort-btn" type="button" data-field="value">Value</button>
      </div>
      <input id="search" class="search" type="search" placeholder="Search stock or category" />
    </div>

    <section id="stockList" class="stock-list hidden"></section>
    <section id="monthlyView" class="trend-view hidden"></section>
    <section id="heatmapView" class="hidden"></section>
    <section id="trendView" class="trend-view hidden"></section>
    <section id="feedView" class="hidden"></section>
  </main>

  <button id="ocrBtn" class="fab fab-secondary hidden" aria-label="Update prices from screenshot" title="Update prices from a broker screenshot">📷</button>
  <button id="mfFetchBtn" class="fab fab-secondary hidden" aria-label="Fetch latest NAV online" title="Fetch latest NAV for all funds (AMFI)">☁️</button>
  <button id="addBtn" class="fab hidden" aria-label="Add stock">+</button>
  <button id="mfAddBtn" class="fab hidden" aria-label="Add mutual fund">+</button>
  <button id="fdAddBtn" class="fab hidden" aria-label="Add fixed deposit">+</button>

  <nav class="bottom-nav" id="bottomNav"></nav>
  <nav class="bottom-nav hidden" id="mfBottomNav"></nav>
  <nav class="bottom-nav hidden" id="fdBottomNav"></nav>
  <nav class="bottom-nav hidden" id="divBottomNav"></nav>

  <div id="modalHost" class="modal-host hidden" aria-hidden="true"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
